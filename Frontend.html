<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>B+ Tree DBMS</title>
    <style>
        /* BASE & SPACE BACKGROUND (Preserved) */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: linear-gradient(to bottom, #0b0b2b, #1b2735 70%, #090a0f);
            font-family: 'Arial', sans-serif;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        .stars {
            width: 1px; height: 1px; position: fixed; top: 0; left: 0; background: white;
            box-shadow: 2vw 5vh 2px white, 10vw 8vh 2px white, 15vw 15vh 1px white, 22vw 22vh 1px white, 28vw 12vh 2px white, 32vw 32vh 1px white, 38vw 18vh 2px white, 42vw 35vh 1px white, 48vw 25vh 2px white, 53vw 42vh 1px white, 58vw 15vh 2px white, 63vw 38vh 1px white, 68vw 28vh 2px white, 73vw 45vh 1px white, 78vw 32vh 2px white, 83vw 48vh 1px white, 88vw 20vh 2px white, 93vw 52vh 1px white, 98vw 35vh 2px white, 5vw 60vh 1px white, 12vw 65vh 2px white, 18vw 72vh 1px white, 25vw 78vh 2px white, 30vw 85vh 1px white, 35vw 68vh 2px white, 40vw 82vh 1px white, 45vw 92vh 2px white, 50vw 75vh 1px white, 55vw 88vh 2px white, 60vw 95vh 1px white, 65vw 72vh 2px white, 70vw 85vh 1px white, 75vw 78vh 2px white, 80vw 92vh 1px white, 85vw 82vh 2px white, 90vw 88vh 1px white, 95vw 75vh 2px white;
            animation: twinkle 8s infinite linear; z-index: -1;
        }

        .stars::after {
            content: ""; position: absolute; width: 1px; height: 1px; background: white;
            box-shadow: 8vw 12vh 2px white, 16vw 18vh 1px white, 24vw 25vh 2px white, 33vw 15vh 1px white, 41vw 28vh 2px white, 49vw 35vh 1px white, 57vw 22vh 2px white, 65vw 42vh 1px white, 73vw 28vh 2px white, 81vw 48vh 1px white, 89vw 32vh 2px white, 97vw 45vh 1px white, 3vw 68vh 2px white, 11vw 75vh 1px white, 19vw 82vh 2px white, 27vw 88vh 1px white, 35vw 72vh 2px white, 43vw 85vh 1px white, 51vw 92vh 2px white, 59vw 78vh 1px white;
            animation: twinkle 6s infinite linear reverse;
        }

        .shooting-star { position: fixed; width: 100px; height: 2px; background: linear-gradient(90deg, white, transparent); animation: shoot 3s infinite ease-in; z-index: -1; }
        .shooting-star:nth-child(1) { top: 20%; left: -100px; animation-delay: 0s; }
        .shooting-star:nth-child(2) { top: 35%; left: -100px; animation-delay: 1s; }
        .shooting-star:nth-child(3) { top: 50%; left: -100px; animation-delay: 2s; }

        @keyframes twinkle { 0%, 100% { opacity: 0.8; } 50% { opacity: 0.4; } }
        @keyframes shoot { 0% { transform: translateX(0) translateY(0) rotate(25deg); opacity: 1; } 100% { transform: translateX(120vw) translateY(50vh) rotate(25deg); opacity: 0; } }

        .simple-title { font-size: 3rem; font-weight: bold; margin-bottom: 30px; letter-spacing: 2px; text-transform: uppercase; }

        .container { width: 95%; max-width: 900px; background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(10px); padding: 30px; border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5); }
        .card { background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 10px; padding: 20px; margin-bottom: 20px; }
        h3 { color: #00d4ff; margin-bottom: 15px; font-size: 1.1rem; }
        .controls { display: flex; gap: 10px; flex-wrap: wrap; }
        input { padding: 12px; background: rgba(255, 255, 255, 0.05); border: 1px solid #555; color: #fff; border-radius: 6px; flex: 1; min-width: 150px; }
        button { padding: 12px 20px; border: none; border-radius: 6px; color: white; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-green { background: #28a745; }
        .btn-green:hover { background: #218838; transform: translateY(-2px); }
        .btn-blue { background: #007bff; }
        .btn-blue:hover { background: #0069d9; transform: translateY(-2px); }
        .btn-red { background: #dc3545; padding: 5px 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 14px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        th { color: #00d4ff; font-weight: bold; text-transform: uppercase; font-size: 0.9rem; }
        #msg { color: #2ecc71; margin-top: 10px; display: none; font-weight: bold; }
        #searchResult { margin-top: 15px; color: #fff; padding: 12px; border: 1px solid rgba(0, 212, 255, 0.5); border-radius: 8px; display: none; background: rgba(0, 212, 255, 0.1); }
    </style>
</head>
<body>

    <div class="stars"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>

    <h1 class="simple-title">B+ Tree Database Management</h1>

    <div class="container">
        <div class="card">
            <h3>Insert New Student</h3>
            <div class="controls">
                <input type="text" id="name" placeholder="Student Name">
                <input type="text" id="course" placeholder="Course">
                <input type="number" id="marks" placeholder="Marks">
                <button class="btn-green" onclick="add()">Insert into Database</button>
            </div>
            <div id="msg">✨ Data and B+ Tree Index Updated!</div>
        </div>

        <div class="card">
            <h3>Index Search</h3>
            <div class="controls">
                <input type="number" id="sid" placeholder="Student ID">
                <button class="btn-blue" onclick="traverse()">Traverse in B+ Tree</button>
            </div>
            <div id="searchResult"></div>
        </div>

        <div class="card">
            <h3>Database Records</h3>
            <table>
                <thead>
                    <tr>
                        <th>ID</th><th>Name</th><th>Course</th><th>Marks</th><th>Action</th>
                    </tr>
                </thead>
                <tbody id="rows"></tbody>
            </table>
        </div>
    </div>

<script>
    const BASE = "http://localhost:5000";

    async function refresh() {
        try {
            const r = await fetch(`${BASE}/view`);
            const data = await r.json();
            const body = document.getElementById("rows");
            body.innerHTML = "";
            data.forEach(s => {
                body.innerHTML += `<tr>
                    <td>${s[0]}</td><td>${s[1]}</td><td>${s[2]}</td><td>${s[3]}</td>
                    <td><button class="btn-red" onclick="remove(${s[0]})">Delete</button></td>
                </tr>`;
            });
        } catch (e) { console.log("Backend offline"); }
    }

    async function add() {
        const name = document.getElementById("name").value;
        const course = document.getElementById("course").value;
        const marks = document.getElementById("marks").value;
        if(!name || !course || !marks) return alert("All fields required");

        const res = await fetch(`${BASE}/add`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({name, course, marks})
        });

        if(res.ok) {
            const msg = document.getElementById("msg");
            msg.style.display = "block";
            setTimeout(() => msg.style.display = "none", 3000);
            document.getElementById("name").value = "";
            document.getElementById("course").value = "";
            document.getElementById("marks").value = "";
            refresh();
        }
    }

    async function traverse() {
        const id = document.getElementById("sid").value;
        if(!id) return;
        const res = await fetch(`${BASE}/search/${id}`);
        const data = await res.json();
        const box = document.getElementById("searchResult");
        
        box.style.display = "block";
        if(data) {
            // Mapping: [id, name, course, marks]
            box.innerHTML = `<strong>✨ Traversal Successful:</strong> Found ${data[1]} (${data[2]}) - Marks: ${data[3]}`;
        } else {
            box.innerHTML = "❌ Traversal Completed: ID not found in the B+ Tree index nodes.";
        }
    }

    async function remove(id) {
        if(confirm("Confirm Delete? This will update the B+ Tree Index.")) {
            await fetch(`${BASE}/delete/${id}`, {method: "DELETE"});
            refresh();
        }
    }

    window.onload = refresh;
</script>
</body>
</html>
